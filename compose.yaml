services:
  db:
    image: postgres:17-alpine
    container_name: career-os-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: careeros
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - careeros-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d careeros"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  careeros-postgres-data:
